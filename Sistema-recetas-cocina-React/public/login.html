<!DOCTYPE html>
<html lang="es">
<!-- 
    ===================================
    PÁGINA DE INICIO DE SESIÓN
    Sistema de Recetas de Cocina
    ===================================
    
    Permite a los usuarios autenticarse en el sistema
    - Formulario de login (usuario/email + contraseña)
    - Validación en tiempo real
    - Redirección automática al dashboard tras login exitoso
    - Enlace para registro de nuevos usuarios
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Sistema de Recetas</title>
    <!-- Estilos compartidos para páginas de autenticación -->
    <link rel="stylesheet" href="auth.css">
    <!-- Iconos de Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- ===================================
         CONTENEDOR PRINCIPAL DE AUTENTICACIÓN
         Centrado en pantalla con diseño responsivo
         =================================== -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-utensils"></i>
                <h1>Sistema de Recetas</h1>
                <p>Inicia sesión para continuar</p>
            </div>
            
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="login">Usuario o Email:</label>
                    <input type="text" id="login" name="login" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña:</label>
                    <div class="password-input">
                        <input type="password" id="password" name="password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="btn-primary">
                    <i class="fas fa-sign-in-alt"></i>
                    Iniciar Sesión
                </button>
            </form>
            
            <div class="auth-footer">
                <p>¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
            </div>
        </div>
    </div>
    
    <div id="loading" class="loading" style="display: none;">
        <div class="spinner"></div>
        <p>Iniciando sesión...</p>
    </div>
    
    <div id="toast-container" class="toast-container"></div>
    
    <script src="auth.js"></script>
</body>
</html>
